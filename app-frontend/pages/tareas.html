<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Tareas</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>

<body>

<nav class="navbar navbar-dark bg-dark">
  <div class="container">

    <a href="../index.html" class="btn btn-outline-light fw-bold px-4 ms-3">
      Focuss
    </a>

  </div>
</nav>

<div class="container mt-4">

<h3>Tareas</h3>

<button class="btn btn-primary mb-3" data-bs-toggle="modal" data-bs-target="#modalTarea">
+ Nueva tarea
</button>

<ul class="list-group" id="listaTareas">
</ul>

</div>

<div class="modal fade" id="modalTarea">
  <div class="modal-dialog">
    <div class="modal-content">

      <div class="modal-header">
        <h5>Nueva tarea</h5>
        <button class="btn-close" data-bs-dismiss="modal"></button>
      </div>

      <div class="modal-body">

        <input id="inputTarea" class="form-control mb-2" placeholder="Nombre de tarea">

        <input id="inputTiempo" type="number" class="form-control" placeholder="Tiempo (minutos)" value="25">

      </div>

      <div class="modal-footer">
        <button class="btn btn-success" onclick="agregarTarea()">Guardar</button>
      </div>

    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>

</body>
</html>
