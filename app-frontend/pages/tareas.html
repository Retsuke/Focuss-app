<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Tareas — Focuss</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Focuss</a>
    <a href="dashboard.html" class="btn btn-outline-light btn-sm px-3 ms-auto">
      <i class="bi bi-grid me-1"></i>Dashboard
    </a>
  </div>
</nav>

<div class="page-content container py-4" style="max-width:700px">

  <div class="d-flex align-items-start justify-content-between mb-4 fade-in">
    <div>
      <p class="f-section-label mb-1">Gestión</p>
      <h2 class="f-page-title">Tareas</h2>
    </div>
    <button class="btn btn-accent" data-bs-toggle="modal" data-bs-target="#modalTarea">
      <i class="bi bi-plus-lg me-1"></i>Nueva tarea
    </button>
  </div>

  <div class="card fade-in-1">
    <div id="taskListContainer">
      <div id="emptyState" class="text-center text-muted py-5">
        <i class="bi bi-clipboard fs-2 d-block mb-2" style="color:var(--f-surface2)"></i>
        <span class="small">Sin tareas por ahora. ¡Agrega tu primera!</span>
      </div>
    </div>
  </div>

</div>

<div class="modal fade" id="modalTarea" tabindex="-1">
  <div class="modal-dialog modal-dialog-centered">
    <div class="modal-content">
      <div class="modal-header">
        <h5 class="modal-title">Nueva tarea</h5>
        <button type="button" class="btn-close" data-bs-dismiss="modal"></button>
      </div>
      <div class="modal-body">
        <div class="mb-3">
          <label class="form-label">Nombre de la tarea</label>
          <input id="inputTarea" type="text" class="form-control" placeholder="Ej: Estudiar matemáticas">
        </div>
        <div class="mb-2">
          <label class="form-label">Tiempo estimado (minutos)</label>
          <input id="inputTiempo" type="number" class="form-control" value="25" min="1">
          <small id="tiempoPremiumHint" class="text-muted" style="display:none">
            Personalizar el tiempo es una función Premium. <a href="checkout.html" style="color:var(--f-accent)">Actualizar cuenta</a>
          </small>
        </div>
      </div>
      <div class="modal-footer">
        <button class="btn btn-outline-light btn-sm" data-bs-dismiss="modal">Cancelar</button>
        <button class="btn btn-accent btn-sm" onclick="agregarTarea()">
          <i class="bi bi-check-lg me-1"></i>Guardar
        </button>
      </div>
    </div>
  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
checkAuth();

if (!esPremium()) {
  const inputTiempo = document.getElementById("inputTiempo");
  inputTiempo.value = 25;
  inputTiempo.disabled = true;
  document.getElementById("tiempoPremiumHint").style.display = "block";
}

async function renderTareas() {
  const container  = document.getElementById("taskListContainer");
  const emptyState = document.getElementById("emptyState");
  const tareas     = await cargarTareas();

  container.querySelectorAll("ul").forEach(el => el.remove());

  if (!tareas.length) {
    emptyState && (emptyState.style.display = "");
    return;
  }

  emptyState && (emptyState.style.display = "none");
  const ul = document.createElement("ul");
  ul.className = "list-group list-group-flush";

  tareas.forEach(t => {
    const li = document.createElement("li");
    li.className = "list-group-item d-flex align-items-center gap-3 px-3";

    const checkbox = document.createElement("input");
    checkbox.type = "checkbox";
    checkbox.className = "form-check-input mt-0";
    checkbox.checked = t.done;
    checkbox.addEventListener("change", () => toggleTareaAPI(t.id, checkbox.checked, t.nombre, t.tiempo));

    const nombre = document.createElement("span");
    nombre.className = `flex-grow-1 ${t.done ? 'text-decoration-line-through text-muted' : ''}`;
    nombre.textContent = t.nombre;

    const badge = document.createElement("span");
    badge.className = "badge-f-accent me-1";
    badge.textContent = `${t.tiempo} min`;

    const btnStart = document.createElement("button");
    btnStart.className = "btn btn-sm";
    btnStart.style.cssText = "background:var(--f-green-soft);border:1px solid rgba(0,203,169,0.2);color:var(--f-green);border-radius:8px;padding:4px 10px";
    btnStart.title = "Iniciar timer";
    btnStart.innerHTML = '<i class="bi bi-play-fill"></i>';
    btnStart.addEventListener("click", () => iniciarTarea(t.id, t.tiempo, t.nombre));

    const btnDelete = document.createElement("button");
    btnDelete.className = "btn btn-sm";
    btnDelete.style.cssText = "background:var(--f-red-soft);border:1px solid rgba(255,107,129,0.2);color:var(--f-red);border-radius:8px;padding:4px 10px";
    btnDelete.innerHTML = '<i class="bi bi-trash"></i>';
    btnDelete.addEventListener("click", () => eliminarTarea(t.id));

    li.append(checkbox, nombre, badge, btnStart, btnDelete);
    ul.appendChild(li);
  });

  container.appendChild(ul);
}

document.addEventListener("DOMContentLoaded", renderTareas);
</script>
</body>
</html>
