<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">

<title>Focuss Demo</title>

<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">

<style>
body {
  background: linear-gradient(135deg, #1f1c2c, #928dab);
  min-height: 100vh;
  color: white;
  font-family: 'Segoe UI', sans-serif;
}

.glass-card {
  background: rgba(255,255,255,0.08);
  border: none;
  backdrop-filter: blur(10px);
  border-radius: 15px;
}

.container-demo {
  max-width: 700px;
}
</style>

</head>

<body class="d-flex flex-column min-vh-100">

<nav class="navbar navbar-dark bg-dark shadow">
  <div class="container">

    <a href="../index.html" class="text-white fw-bold fs-3 text-decoration-none">
      Focuss
    </a>

    <div class="dropdown ms-auto">
      <a class="text-white fs-4 text-decoration-none dropdown-toggle"
         href="#"
         data-bs-toggle="dropdown">
        <i class="bi bi-person-circle"></i>
      </a>

      <ul class="dropdown-menu dropdown-menu-end">
        <li><a class="dropdown-item" href="login.html">Iniciar sesión</a></li>
        <li><a class="dropdown-item" href="registro.html">Registrarse</a></li>
      </ul>
    </div>

  </div>
</nav>

<div class="container container-demo flex-grow-1 d-flex flex-column justify-content-center">

  <!-- INTRO -->
  <div class="text-center mb-4 mt-4">
    <h1 class="fw-bold">Modo Demo</h1>
    <p class="text-white-50">
      Prueba la aplicación sin registrarte
    </p>
  </div>

  <div class="glass-card p-4 mb-4">

    <input id="inputTarea" class="form-control mb-2" placeholder="Nueva tarea">

    <input id="inputTiempo" type="number" class="form-control mb-3" value="25">

    <button class="btn btn-primary w-100" onclick="agregarTarea()">
      Agregar tarea
    </button>

  </div>

  <div class="glass-card p-4">

    <h5 class="mb-3">Tareas del demo</h5>

    <ul id="listaTareas" class="list-group"></ul>

  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>

</body>
</html>
