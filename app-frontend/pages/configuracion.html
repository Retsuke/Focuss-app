<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Configuración — Focuss</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
.config-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 14px 0;
  border-bottom: 1px solid var(--f-border);
}
.config-row:last-child { border-bottom: none; }

.form-check-input[type="checkbox"] {
  width: 40px;
  height: 22px;
  border-radius: 40px;
  cursor: pointer;
  background-color: var(--f-surface2);
  border-color: var(--f-border);
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='rgba(255,255,255,0.3)'/%3e%3c/svg%3e");
  transition: all 0.2s;
}
.form-check-input[type="checkbox"]:checked {
  background-color: var(--f-accent);
  border-color: var(--f-accent);
  background-image: url("data:image/svg+xml,%3csvg xmlns='http://www.w3.org/2000/svg' viewBox='-4 -4 8 8'%3e%3ccircle r='3' fill='%23fff'/%3e%3c/svg%3e");
}

.config-section-title {
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.12em;
  text-transform: uppercase;
  color: var(--f-muted);
  padding: 14px 0 4px;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Focuss</a>
    <div class="d-flex gap-2 ms-auto">
      <a href="perfil.html" class="btn btn-outline-light btn-sm px-3">
        <i class="bi bi-person me-1"></i>Perfil
      </a>
      <a href="dashboard.html" class="btn btn-outline-light btn-sm px-3">
        <i class="bi bi-grid me-1"></i>Dashboard
      </a>
    </div>
  </div>
</nav>

<div class="page-content container py-4" style="max-width:580px">

  <div class="mb-4 fade-in">
    <p class="f-section-label mb-1">Preferencias</p>
    <h2 class="f-page-title">Configuración</h2>
  </div>

  <div class="card mb-3 fade-in-1">
    <div class="card-body">
      <div class="config-section-title">Notificaciones</div>
      <div class="config-row">
        <div>
          <div class="small fw-600">Notificaciones del timer</div>
          <div class="small text-muted">Alerta del navegador cuando termina una sesión</div>
        </div>
        <input class="form-check-input" type="checkbox" id="cfgNotifTimer" checked>
      </div>
    </div>
  </div>

  <div class="card mb-4 fade-in-3">
    <div class="card-body">
      <div class="d-flex align-items-center justify-content-between">
        <div class="config-section-title mb-0">Temporizador Pomodoro</div>
        <span class="badge-f-accent" id="cfgPremiumBadge" style="display:none">Premium</span>
      </div>
      <div class="row g-3 pt-2">
        <div class="col-12">
          <label class="form-label">Tiempo de foco (minutos)</label>
          <input id="cfgFoco" type="number" class="form-control" value="25" min="1" max="90">
        </div>
        <div class="col-6">
          <label class="form-label">Descanso corto (min)</label>
          <input id="cfgCorto" type="number" class="form-control" value="5" min="1" max="30">
        </div>
        <div class="col-6">
          <label class="form-label">Descanso largo (min)</label>
          <input id="cfgLargo" type="number" class="form-control" value="15" min="1" max="60">
        </div>
      </div>
      <small id="cfgPremiumHint" class="text-muted d-block mt-2" style="display:none">
        Personalizar la duración del Pomodoro es una función Premium. <a href="checkout.html" style="color:var(--f-accent)">Actualizar cuenta</a>
      </small>
    </div>
  </div>

  <button class="btn btn-accent w-100 fade-in-4" onclick="guardarConfiguracion()">
    <i class="bi bi-check-lg me-2"></i>Guardar cambios
  </button>
  <div id="cfgGuardado" class="text-center small mt-2" style="color:var(--f-green);display:none">
    <i class="bi bi-check-circle-fill me-1"></i>Configuración guardada
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
checkAuth();

const POMODORO_KEY = "pomodoroConfig";
const NOTIF_KEY    = "notifTimerEnabled";

document.addEventListener("DOMContentLoaded", () => {
  const notifGuardado = localStorage.getItem(NOTIF_KEY);
  document.getElementById("cfgNotifTimer").checked = notifGuardado !== "false";

  const premium = esPremium();
  if (!premium) {
    ["cfgFoco", "cfgCorto", "cfgLargo"].forEach(id => document.getElementById(id).disabled = true);
    document.getElementById("cfgPremiumHint").style.display = "block";
  } else {
    document.getElementById("cfgPremiumBadge").style.display = "inline-block";
  }

  const configGuardada = JSON.parse(localStorage.getItem(POMODORO_KEY) || "null");
  if (configGuardada && premium) {
    document.getElementById("cfgFoco").value  = configGuardada.focus;
    document.getElementById("cfgCorto").value = configGuardada.short;
    document.getElementById("cfgLargo").value = configGuardada.long;
  }
});

function guardarConfiguracion() {
  localStorage.setItem(NOTIF_KEY, document.getElementById("cfgNotifTimer").checked);

  if (esPremium()) {
    const config = {
      focus: parseInt(document.getElementById("cfgFoco").value)  || 25,
      short: parseInt(document.getElementById("cfgCorto").value) || 5,
      long:  parseInt(document.getElementById("cfgLargo").value) || 15
    };
    localStorage.setItem(POMODORO_KEY, JSON.stringify(config));
  }

  const aviso = document.getElementById("cfgGuardado");
  aviso.style.display = "block";
  setTimeout(() => aviso.style.display = "none", 2500);
}
</script>
</body>
</html>
