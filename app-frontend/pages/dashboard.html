<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Dashboard — Focuss</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
.quick-link {
  display: flex;
  align-items: center;
  gap: 14px;
  padding: 16px 18px;
  background: var(--f-surface);
  border: 1px solid var(--f-border);
  border-radius: var(--f-radius);
  text-decoration: none;
  color: var(--bs-body-color);
  transition: all 0.2s;
}
.quick-link:hover {
  border-color: rgba(108,92,231,0.35);
  background: var(--f-surface2);
  transform: translateX(4px);
  color: var(--bs-body-color);
}
.ql-icon {
  width: 40px; height: 40px;
  border-radius: 10px;
  display: flex; align-items: center; justify-content: center;
  font-size: 1.1rem;
  flex-shrink: 0;
}
.ql-sub { font-size: 0.75rem; color: var(--f-muted); }
</style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Focuss</a>
    <div class="d-flex gap-2 ms-auto">
      <a href="perfil.html" class="btn btn-outline-light btn-sm px-3">
        <i class="bi bi-person me-1"></i>Perfil
      </a>
      <button class="btn-ghost-danger btn-sm" onclick="logout()">
        <i class="bi bi-box-arrow-right me-1"></i>Salir
      </button>
    </div>
  </div>
</nav>

<div class="page-content container py-4" style="max-width:900px">

  <div class="mb-4 fade-in">
    <p class="f-section-label mb-1">Panel principal</p>
    <h2 class="f-page-title">Hola, <span id="dashNombre">Usuario</span> 👋</h2>
  </div>

  <div class="row g-3 mb-4 fade-in-1">
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label">Horas de enfoque</div>
        <div class="stat-value" style="color:var(--f-accent)">5<span style="font-size:1.1rem">h</span></div>
        <div class="progress mt-2" style="height:4px">
          <div class="progress-bar bg-accent" style="width:62%"></div>
        </div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label">Tareas pendientes</div>
        <div class="stat-value" id="statPendientes">—</div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label">Racha actual</div>
        <div class="stat-value" style="color:var(--f-green)">4<span style="font-size:1.1rem">d</span></div>
      </div>
    </div>
    <div class="col-6 col-md-3">
      <div class="stat-card">
        <div class="stat-label">Completadas</div>
        <div class="stat-value" id="statCompletadas">—</div>
      </div>
    </div>
  </div>

  <p class="f-section-label mb-2 fade-in-2">Accesos rápidos</p>
  <div class="row g-3 mb-4 fade-in-2">
    <div class="col-md-6">
      <a href="tareas.html" class="quick-link">
        <div class="ql-icon" style="background:var(--f-accent-soft);color:var(--f-accent)"><i class="bi bi-list-check"></i></div>
        <div>
          <div class="fw-600">Tareas</div>
          <div class="ql-sub" id="qlTareasSub">Cargando...</div>
        </div>
        <i class="bi bi-chevron-right ms-auto text-muted"></i>
      </a>
    </div>
    <div class="col-md-6">
      <a href="timer.html" class="quick-link">
        <div class="ql-icon" style="background:var(--f-green-soft);color:var(--f-green)"><i class="bi bi-stopwatch"></i></div>
        <div>
          <div class="fw-600">Temporizador</div>
          <div class="ql-sub">Iniciar sesión Pomodoro</div>
        </div>
        <i class="bi bi-chevron-right ms-auto text-muted"></i>
      </a>
    </div>
    <div class="col-md-6">
      <a href="estadisticas.html" class="quick-link">
        <div class="ql-icon" style="background:rgba(96,165,250,0.1);color:#60a5fa"><i class="bi bi-graph-up-arrow"></i></div>
        <div>
          <div class="fw-600">Estadísticas</div>
          <div class="ql-sub">Ver progreso semanal</div>
        </div>
        <i class="bi bi-chevron-right ms-auto text-muted"></i>
      </a>
    </div>
    <div class="col-md-6">
      <a href="metas.html" class="quick-link">
        <div class="ql-icon" style="background:var(--f-red-soft);color:var(--f-red)"><i class="bi bi-trophy"></i></div>
        <div>
          <div class="fw-600">Metas</div>
          <div class="ql-sub">40% completado</div>
        </div>
        <i class="bi bi-chevron-right ms-auto text-muted"></i>
      </a>
    </div>
  </div>

  <p class="f-section-label mb-2 fade-in-3">Tareas recientes</p>
  <div class="card fade-in-3">
    <div id="recentTasksContainer">
      <div id="noTasksMsg" class="text-center text-muted py-4 small">
        No hay tareas. <a href="tareas.html" style="color:var(--f-accent)">Agrega una</a>
      </div>
    </div>
  </div>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
checkAuth();

document.addEventListener("DOMContentLoaded", async () => {
  const usuario = getUsuarioActual();
  if (usuario) {
    document.getElementById("dashNombre").textContent = usuario.nombre.split(" ")[0];
  }

  const tareas      = await cargarTareas();
  const pendientes  = tareas.filter(t => !t.done).length;
  const completadas = tareas.filter(t => t.done).length;

  document.getElementById("statPendientes").textContent  = pendientes;
  document.getElementById("statCompletadas").textContent = completadas;
  document.getElementById("qlTareasSub").textContent     = `${pendientes} pendiente${pendientes !== 1 ? 's' : ''}`;

  const container = document.getElementById("recentTasksContainer");
  const noMsg     = document.getElementById("noTasksMsg");

  if (tareas.length > 0) {
    noMsg && noMsg.remove();
    const ul = document.createElement("ul");
    ul.className = "list-group list-group-flush";
    tareas.slice(0, 5).forEach(t => {
      const li = document.createElement("li");
      li.className = "list-group-item d-flex align-items-center gap-3 px-3";

      const checkbox = document.createElement("input");
      checkbox.type = "checkbox";
      checkbox.className = "form-check-input mt-0";
      checkbox.checked = t.done;

      const nombre = document.createElement("span");
      nombre.className = `flex-grow-1 ${t.done ? 'text-decoration-line-through text-muted' : ''}`;
      nombre.textContent = t.nombre;

      const badge = document.createElement("span");
      badge.className = "badge-f-accent";
      badge.textContent = `${t.tiempo} min`;

      li.append(checkbox, nombre, badge);
      ul.appendChild(li);
    });
    container.appendChild(ul);
  }
});
</script>
</body>
</html>
