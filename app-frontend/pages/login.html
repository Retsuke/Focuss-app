<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Login — Focuss</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
.auth-wrapper {
  min-height: calc(100vh - 60px);
  display: flex;
  align-items: center;
  justify-content: center;
  padding: 40px 16px;
}
.auth-card {
  width: 100%;
  max-width: 400px;
}
.auth-icon {
  width: 54px; height: 54px;
  border-radius: 14px;
  background: var(--f-accent-soft);
  border: 1px solid rgba(108,92,231,0.25);
  display: flex; align-items: center; justify-content: center;
  font-size: 1.4rem;
  color: var(--f-accent);
  margin: 0 auto 18px;
}
</style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Focuss</a>
    <a href="registro.html" class="btn btn-outline-light btn-sm px-3 ms-auto">Registrarse</a>
  </div>
</nav>

<div class="page-content auth-wrapper">
  <div class="auth-card fade-in">

    <div class="text-center mb-4">
      <div class="auth-icon"><i class="bi bi-lock"></i></div>
      <h2 class="f-page-title">Bienvenido de vuelta</h2>
      <p class="text-muted small mt-1">Ingresa tus credenciales para continuar</p>
    </div>

    <div class="card">
      <div class="card-body">
        <div class="mb-3">
          <label class="form-label">Email</label>
          <input id="loginEmail" type="email" class="form-control" placeholder="tu@email.com" autocomplete="email">
          <div class="field-error" id="errorLoginEmail">Ingresa un email válido</div>
        </div>
        <div class="mb-4">
          <label class="form-label">Contraseña</label>
          <input id="loginPassword" type="password" class="form-control" placeholder="••••••••" autocomplete="current-password">
          <div class="field-error" id="errorLoginPassword">La contraseña no puede estar vacía</div>
        </div>
        <button class="btn btn-accent w-100" onclick="loginValidado()">
          <i class="bi bi-box-arrow-in-right me-2"></i>Ingresar
        </button>
      </div>
    </div>

    <p class="text-center text-muted small mt-3">
      ¿No tienes cuenta?
      <a href="registro.html" class="text-decoration-none" style="color:var(--f-accent);font-weight:600">Regístrate gratis</a>
    </p>

  </div>
</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
function setFieldState(inputId, errorId, valid, msg) {
  const input = document.getElementById(inputId);
  const error = document.getElementById(errorId);
  input.classList.toggle("is-invalid", !valid);
  input.classList.toggle("is-valid", valid);
  if (msg) error.textContent = msg;
  error.classList.toggle("visible", !valid);
}

function loginValidado() {
  const email    = document.getElementById("loginEmail").value.trim();
  const password = document.getElementById("loginPassword").value;
  const emailOk  = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(email);
  const passOk   = password.length > 0;

  setFieldState("loginEmail",    "errorLoginEmail",    emailOk, "Ingresa un email válido");
  setFieldState("loginPassword", "errorLoginPassword", passOk,  "La contraseña no puede estar vacía");

  if (emailOk && passOk) login();
}

document.getElementById("loginEmail").addEventListener("input", function() {
  const ok = /^[^\s@]+@[^\s@]+\.[^\s@]+$/.test(this.value.trim());
  setFieldState("loginEmail", "errorLoginEmail", ok, "Ingresa un email válido");
});

document.getElementById("loginPassword").addEventListener("input", function() {
  setFieldState("loginPassword", "errorLoginPassword", this.value.length > 0, "La contraseña no puede estar vacía");
});
</script>
</body>
</html>
