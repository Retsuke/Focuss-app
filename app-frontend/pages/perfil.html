<!DOCTYPE html>
<html lang="es" data-bs-theme="dark">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>Perfil — Focuss</title>
<link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/css/bootstrap.min.css" rel="stylesheet">
<link href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.3/font/bootstrap-icons.css" rel="stylesheet">
<link rel="stylesheet" href="../css/styles.css">
<style>
.avatar {
  width: 80px; height: 80px;
  border-radius: 50%;
  background: linear-gradient(135deg, var(--f-accent), #b39eff);
  display: flex; align-items: center; justify-content: center;
  font-family: 'Syne', sans-serif;
  font-size: 2rem;
  font-weight: 800;
  color: #fff;
  box-shadow: 0 0 28px rgba(108,92,231,0.35);
  margin: 0 auto;
}
.info-row {
  display: flex;
  align-items: center;
  justify-content: space-between;
  padding: 13px 0;
  border-bottom: 1px solid var(--f-border);
}
.info-row:last-child { border-bottom: none; }
</style>
</head>
<body>

<nav class="navbar navbar-dark sticky-top">
  <div class="container">
    <a class="navbar-brand" href="../index.html">Focuss</a>
    <div class="d-flex gap-2 ms-auto">
      <a href="configuracion.html" class="btn btn-outline-light btn-sm px-3">
        <i class="bi bi-gear"></i>
      </a>
      <a href="dashboard.html" class="btn btn-outline-light btn-sm px-3">
        <i class="bi bi-grid me-1"></i>Dashboard
      </a>
    </div>
  </div>
</nav>

<div class="page-content container py-4" style="max-width:580px">

  <div class="text-center mb-4 fade-in">
    <div class="avatar mb-3" id="avatarInicial">U</div>
    <h5 class="mb-0" style="font-weight:700" id="perfilNombre">Usuario</h5>
    <small class="text-muted" id="perfilEmail">usuario@email.com</small>
  </div>

  <div class="row g-3 mb-4 fade-in-1">
    <div class="col-4">
      <div class="stat-card text-center">
        <div class="stat-value" style="color:var(--f-accent);font-size:1.6rem">4</div>
        <div class="stat-label mt-1">Racha</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card text-center">
        <div class="stat-value" style="color:var(--f-green);font-size:1.6rem" id="statTareas">0</div>
        <div class="stat-label mt-1">Tareas</div>
      </div>
    </div>
    <div class="col-4">
      <div class="stat-card text-center">
        <div class="stat-value" style="font-size:1.6rem">5h</div>
        <div class="stat-label mt-1">Enfoque</div>
      </div>
    </div>
  </div>

  <div class="card mb-4 fade-in-2">
    <div class="card-body">
      <div class="info-row">
        <small class="text-muted">Nombre</small>
        <span class="small fw-600" id="infoNombre">Usuario</span>
      </div>
      <div class="info-row">
        <small class="text-muted">Email</small>
        <span class="small fw-600" id="infoEmail">usuario@email.com</span>
      </div>
      <div class="info-row">
        <small class="text-muted">Miembro desde</small>
        <span class="small fw-600" id="infoDesde">Mayo 2026</span>
      </div>
      <div class="info-row">
        <small class="text-muted">Plan</small>
        <span class="badge-f-accent">Gratuito</span>
      </div>
    </div>
  </div>

  <button class="btn w-100 fade-in-3" style="background:var(--f-red-soft);border:1px solid rgba(255,107,129,0.2);color:var(--f-red);border-radius:40px;font-weight:600" onclick="logout()">
    <i class="bi bi-box-arrow-right me-2"></i>Cerrar sesión
  </button>

</div>

<script src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.0/dist/js/bootstrap.bundle.min.js"></script>
<script src="../js/script.js"></script>
<script>
checkAuth();

document.addEventListener("DOMContentLoaded", async () => {
  const usuario = getUsuarioActual();
  if (usuario) {
    const inicial = usuario.nombre.charAt(0).toUpperCase();
    const meses   = ["Enero","Febrero","Marzo","Abril","Mayo","Junio","Julio","Agosto","Septiembre","Octubre","Noviembre","Diciembre"];
    const ahora   = new Date();
    const desde   = `${meses[ahora.getMonth()]} ${ahora.getFullYear()}`;

    document.getElementById("avatarInicial").textContent = inicial;
    document.getElementById("perfilNombre").textContent  = usuario.nombre;
    document.getElementById("perfilEmail").textContent   = usuario.email;
    document.getElementById("infoNombre").textContent    = usuario.nombre;
    document.getElementById("infoEmail").textContent     = usuario.email;
    document.getElementById("infoDesde").textContent     = desde;
  }

  const tareas      = await cargarTareas();
  const completadas = tareas.filter(t => t.done).length;
  document.getElementById("statTareas").textContent = completadas;
});
</script>
</body>
</html>
